services:
  # ==========================================
  # 1. COINCIDENCIAS
  # ==========================================
  postgres-db-coincidencias:
    image: postgis/postgis:16-3.4
    container_name: db_coincidencias
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Conce123
      POSTGRES_DB: db_coincidencias
    ports:
      - "5435:5432"
    networks:
      - sanosysalvos_net
    volumes:
      - coincidencias_postgres_data:/var/lib/postgresql/data

  coincidencias-app:
    build: ../Coincidencias-main/Coincidencias-main
    container_name: coincidencias_service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db_coincidencias:5432/db_coincidencias
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Conce123
      - NOTIFICACION_SERVICE_URL=http://notificaciones_app:8083/api/notificaciones/coincidencia
      - REPORTES_SERVICE_URL=http://reportes_service:8081
    depends_on:
      - postgres-db-coincidencias
    networks:
      - sanosysalvos_net

  # ==========================================
  # 2. GEOLOCALIZACION
  # ==========================================
  geolocalizacion_db:
    image: postgis/postgis:16-3.4
    container_name: geolocalizacion-db
    environment:
      POSTGRES_DB: geolocalizacion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Conce123
    ports:
      - "5434:5432"
    networks:
      - sanosysalvos_net
    volumes:
      - geolocalizacion_db_data:/var/lib/postgresql/data

  geolocalizacion_app:
    build: ../Geolocalizacion/Geolocalizacion
    container_name: geolocalizacion-app
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://geolocalizacion-db:5432/geolocalizacion
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Conce123
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - geolocalizacion_db
    networks:
      - sanosysalvos_net

  # ==========================================
  # 3. IDENTIFICACION ACCESO
  # ==========================================
  id_db:
    image: postgres:16-alpine
    container_name: id_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Conce123
      POSTGRES_DB: id_db
    ports:
      - "5430:5432"
    networks:
      - sanosysalvos_net
    volumes:
      - id_db_data:/var/lib/postgresql/data

  identificacion_acceso_app:
    build: ../IdentificacioAcceso/IdentificacioAcceso/IdentificacioAcceso
    container_name: identificacion_acceso_app
    ports:
      - "8085:8085"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://id_db:5432/id_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Conce123
      - USUARIO_SERVICE_URL=http://usuario_service:8080
    depends_on:
      - id_db
    networks:
      - sanosysalvos_net

  # ==========================================
  # 4. MASCOTAS
  # ==========================================
  mascota_db:
    image: postgres:16-alpine
    container_name: mascota_db_container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Conce123
      POSTGRES_DB: mascota_db
    ports:
      - "5431:5432"
    networks:
      - sanosysalvos_net
    volumes:
      - mascota_postgres_data:/var/lib/postgresql/data

  mascotas_app:
    build: ../Mascotas/Mascotas
    container_name: mascotas_app
    ports:
      - "8086:8086"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://mascota_db_container:5432/mascota_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Conce123
    depends_on:
      - mascota_db
    networks:
      - sanosysalvos_net

  # ==========================================
  # 5. NOTIFICACIONES
  # ==========================================
  notificaciones_db:
    image: postgres:16-alpine
    container_name: notif_db_container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Conce123
      POSTGRES_DB: notificaciones_db
    ports:
      - "5436:5432"
    networks:
      - sanosysalvos_net
    volumes:
      - notif_postgres_data:/var/lib/postgresql/data

  notificaciones_app:
    build: ../Notificaciones/Notificaciones
    container_name: notificaciones_app
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://notif_db_container:5432/notificaciones_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Conce123
    depends_on:
      - notificaciones_db
    networks:
      - sanosysalvos_net

  # ==========================================
  # 6. REPORTES
  # ==========================================
  postgres-reportes-db:
    image: postgis/postgis:16-3.4
    container_name: db_reportes
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Conce123
      POSTGRES_DB: db_reportes
    ports:
      - "5432:5432"
    networks:
      - sanosysalvos_net
    volumes:
      - reportes_postgres_data:/var/lib/postgresql/data

  reportes-app:
    build: ../Reportes-main/Reportes-main
    container_name: reportes_service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db_reportes:5432/db_reportes
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Conce123
      - USUARIO_SERVICE_URL=http://usuario_service:8080
      - COINCIDENCIA_SERVICE_URL=http://coincidencias_service:8082
    depends_on:
      - postgres-reportes-db
    networks:
      - sanosysalvos_net

  # ==========================================
  # 7. USUARIOS
  # ==========================================
  postgres-usuarios-db:
    image: postgres:16-alpine
    container_name: db_usuarios
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Conce123
      POSTGRES_DB: db_usuarios
    ports:
      - "5433:5432"
    networks:
      - sanosysalvos_net
    volumes:
      - usuarios_postgres_data:/var/lib/postgresql/data

  usuario-app:
    build: ../Usuarios-main/Usuarios-main
    container_name: usuario_service
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db_usuarios:5432/db_usuarios
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Conce123
      - AUTH_SERVICE_URL=http://identificacion_acceso_app:8085
    depends_on:
      - postgres-usuarios-db
    networks:
      - sanosysalvos_net

# ==========================================
# CONFIGURACIÓN GLOBAL DE RED Y VOLUMENES
# ==========================================
networks:
  sanosysalvos_net:
    driver: bridge

volumes:
  coincidencias_postgres_data:
  geolocalizacion_db_data:
  id_db_data:
  mascota_postgres_data:
  notif_postgres_data:
  reportes_postgres_data:
  usuarios_postgres_data:
